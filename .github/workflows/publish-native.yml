name: Publish native

# Build the optional Rust extension (repleafgbm-native) as platform wheels for
# Linux/macOS/Windows x CPython 3.10-3.12 and publish to PyPI via OIDC
# "trusted publishing". This is a SECOND PyPI project, separate from the pure
# Python `repleafgbm` distribution built by publish.yml; both are released on
# the same `v*` tag. A manual run (workflow_dispatch) publishes to TestPyPI.
#
# Prerequisites (one-time, PyPI side — see docs/publishing_checklist.md):
#   pypi.org/manage/account/publishing -> add a trusted publisher
#     PyPI Project Name: repleafgbm-native
#     Owner:             Matapanino
#     Repository name:   repleafgbm
#     Workflow name:     publish-native.yml
#     Environment:       (leave blank)
#   For the TestPyPI dry run, repeat at test.pypi.org.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # manual TestPyPI dry run

# Run JavaScript actions on Node.js 24 (Node.js 20 is deprecated on runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  wheels:
    name: wheel ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # On Linux the build runs inside a manylinux container (manylinux: auto)
      # for portable wheels; the host setup-python is not visible there, so we
      # tell maturin which interpreter to use (the numeric form resolves to the
      # container's /opt/python). macOS/Windows have no container and
      # auto-detect the setup-python above (where the numeric -i form would not
      # resolve), so the interpreter flag is added on Linux only.
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: native
          command: build
          args: --release --out dist ${{ matrix.os == 'ubuntu-latest' && format('-i {0}', matrix.python-version) || '' }}
          manylinux: auto
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: native/dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: native
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: native/dist/*.tar.gz

  testpypi:
    # Dry run: manual dispatch publishes to TestPyPI.
    if: github.event_name == 'workflow_dispatch'
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    # Real release: a version tag (vX.Y.Z) publishes to PyPI.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
